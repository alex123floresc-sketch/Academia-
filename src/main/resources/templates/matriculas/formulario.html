<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Nueva matrícula</title>
</head>
<div layout:fragment="contenido">
    <a th:href="@{/matriculas}" class="page-back">← Volver a la lista</a>
    <h2 class="page-title">Registrar matrícula</h2>

    <div class="form-card">
        <div th:if="${error}" class="alert-error" th:text="${error}"></div>

        <form th:action="@{/matriculas/guardar}" method="post">
            <div class="grid-2">
                <div class="field">
                    <label>Alumno</label>
                    <div class="combo" id="comboAlumno">
                        <input type="text" class="combo-input" placeholder="Buscar por nombre..." autocomplete="off" required>
                        <button type="button" class="combo-clear" aria-label="Quitar selección">&times;</button>
                        <input type="hidden" name="estudianteId" class="combo-value">
                        <div class="combo-panel">
                            <div class="combo-row" th:each="al : ${alumnos}"
                                 th:attr="data-valor=${al.id},data-texto=${al.nombre + ' ' + al.apellido + ' — ' + al.area},data-buscar=${#strings.toLowerCase(al.nombre + ' ' + al.apellido)}">
                                <div>
                                    <div class="cn" th:text="${al.nombre + ' ' + al.apellido}"></div>
                                    <div class="cm" th:text="${al.area}"></div>
                                </div>
                            </div>
                            <p class="combo-empty" style="display:none">Sin resultados.</p>
                        </div>
                    </div>
                </div>
                <div class="field">
                    <label>Ciclo</label>
                    <div class="combo" id="comboCiclo" th:attr="data-selected=${cicloActivo != null ? cicloActivo.id : null}">
                        <input type="text" class="combo-input" placeholder="Buscar ciclo..." autocomplete="off" required>
                        <button type="button" class="combo-clear" aria-label="Quitar selección">&times;</button>
                        <input type="hidden" name="cicloId" class="combo-value">
                        <div class="combo-panel">
                            <div class="combo-row" th:each="c : ${ciclos}"
                                 th:attr="data-valor=${c.id},data-texto=${c.nombre},data-buscar=${#strings.toLowerCase(c.nombre)}">
                                <div class="cn" th:text="${c.nombre}"></div>
                            </div>
                            <p class="combo-empty" style="display:none">Sin resultados.</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="field">
                <label>Turno</label>
                <select name="turno" required>
                    <option th:each="t : ${turnos}" th:value="${t}" th:text="${t.etiqueta}"></option>
                </select>
            </div>

            <div class="field">
                <label>Cursos a matricular <span class="hint">selecciona los del plan del alumno</span></label>
                <input type="search" id="buscarCurso" placeholder="Buscar curso por nombre o código..." autocomplete="off" style="margin-bottom:8px">
                <div class="courselist" id="courseList">
                    <label class="courserow" th:each="curso : ${cursos}"
                           th:attr="data-buscar=${#strings.toLowerCase(curso.nombre + ' ' + curso.codigo)}">
                        <input type="checkbox" name="cursoIds" th:value="${curso.id}" class="js-curso">
                        <div>
                            <div class="cn" th:text="${curso.nombre}"></div>
                            <div class="cm" th:text="${curso.codigo} + ' · ' + (${curso.profesor != null} ? ${curso.profesor.nombreCompleto} : 'Sin asignar')"></div>
                        </div>
                        <span class="ch" th:text="${curso.horas} + ' h'"></span>
                    </label>
                    <p class="empty" id="courseEmpty" style="display:none">Ningún curso coincide con tu búsqueda.</p>
                </div>
                <p class="hint" id="cursosSelCount" style="margin-top:8px">Ningún curso seleccionado.</p>
            </div>

            <div class="pay-box">
                <div class="pt">
                    <svg style="width:17px;height:17px;stroke:currentColor;stroke-width:1.9;fill:none" viewBox="0 0 24 24">
                        <path d="M2 7h20v12H2zM2 11h20"/>
                    </svg>
                    Pago de matrícula
                </div>
                <div class="grid-2">
                    <div class="field" style="margin-bottom:12px">
                        <label style="color:var(--sage-strong)">Concepto matrícula</label>
                        <input type="text" name="conceptoMatricula" value="Matrícula">
                    </div>
                    <div class="field" style="margin-bottom:12px">
                        <label style="color:var(--sage-strong)">Monto (S/)</label>
                        <input type="number" step="0.01" min="0" name="montoMatricula" value="150.00" class="js-monto">
                    </div>
                </div>
                <div class="grid-2">
                    <div class="field" style="margin-bottom:12px">
                        <label style="color:var(--sage-strong)">Concepto pensión</label>
                        <input type="text" name="conceptoPension" value="Pensión (1ra cuota)">
                    </div>
                    <div class="field" style="margin-bottom:6px">
                        <label style="color:var(--sage-strong)">Monto (S/)</label>
                        <input type="number" step="0.01" min="0" name="montoPension" value="180.00" class="js-monto">
                    </div>
                </div>
                <p class="hint" style="color:var(--sage-strong);margin:0 0 4px">Deja el monto de pensión en 0 si no quieres generarla.</p>
                <div class="pay-row total">
                    <span>Total a cobrar hoy</span>
                    <span id="totalPago">S/ 330.00</span>
                </div>
            </div>

            <div class="form-foot">
                <button type="submit" class="btn btn-primary">
                    <svg class="ic" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>
                    Matricular y cobrar
                </button>
                <a th:href="@{/matriculas}" class="btn btn-ghost">Cancelar</a>
            </div>
        </form>
    </div>

    <script>(function(){  var montos = document.querySelectorAll('.js-monto');  var out = document.getElementById('totalPago');  function calc(){    var t = 0;    montos.forEach(function(i){ t += parseFloat(i.value) || 0; });    out.textContent = 'S/ ' + t.toFixed(2);  }  montos.forEach(function(i){ i.addEventListener('input', calc); });  calc();})();</script>

    <script th:src="@{/js/buscador-select.js}"></script>
    <script>
        initCombo('comboAlumno');
        initCombo('comboCiclo');
        initFiltroLista('buscarCurso', 'courseList', '.courserow', 'courseEmpty', 'js-curso', 'cursosSelCount');
    </script>
</div>
</html>
