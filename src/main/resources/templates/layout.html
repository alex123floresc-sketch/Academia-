<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title layout:title-pattern="$CONTENT_TITLE · Academia Horizonte">Academia Horizonte</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <th:block layout:fragment="estilos"></th:block>
</head>
<body>
<div class="app">

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="main">
        <header class="topbar">
            <div>
                <div class="crumb" id="crumb">Panel</div>
                <h1 id="ptitle">Academia Horizonte</h1>
            </div>
            <div class="top-actions" sec:authorize="hasAnyRole('ADMIN','CAJERO')">
                <a th:href="@{/pagos}" class="btn btn-ghost btn-sm">Ver pagos</a>
                <a th:href="@{/matriculas/nueva}" class="btn btn-primary btn-sm">
                    <svg class="ic" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>Nueva matrícula</a>
            </div>
        </header>

        <div class="content">
            <div class="wrap">
                <div th:if="${mensajeExito}" class="alert-success" th:text="${mensajeExito}"></div>
                <div th:if="${mensajeError}" class="alert-error" th:text="${mensajeError}"></div>
                <div layout:fragment="contenido"></div>
            </div>
        </div>
    </main>
</div>

<script>
    (function(){
        var path = window.location.pathname;
        var links = document.querySelectorAll('.sidebar .nav a');
        var best = null;
        links.forEach(function(a){
            var href = a.getAttribute('href');
            if(href && href !== '/' && path.indexOf(href) === 0){
                if(!best || href.length > best.getAttribute('href').length) best = a;
            }
        });
        if(best){
            best.classList.add('active');
            var crumb = document.getElementById('crumb');
            var title = document.getElementById('ptitle');
            if(crumb) crumb.textContent = best.getAttribute('data-group') || 'Panel';
            if(title) title.textContent = best.getAttribute('data-title') || best.textContent.trim();
        }
        var av = document.getElementById('av');
        if(av){ var n = av.getAttribute('data-name') || 'U'; av.textContent = n.trim().substring(0,2).toUpperCase(); }
    })();
</script>
<th:block layout:fragment="scripts"></th:block>
</body>
</html>
