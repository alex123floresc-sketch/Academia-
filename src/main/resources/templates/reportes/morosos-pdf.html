<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Alumnos morosos</title>
    <style type="text/css">
        @page { size: A4; margin: 2cm; }
        body { font-family: Helvetica, Arial, sans-serif; font-size: 11px; color: #222222; }
        .header { text-align: center; margin-bottom: 16px; }
        .header h1 { margin: 0; font-size: 16px; }
        .header h2 { margin: 4px 0 0 0; font-size: 13px; font-weight: normal; }
        table { width: 100%; border-collapse: collapse; margin-top: 8px; }
        th, td { border: 1px solid #333333; padding: 5px 8px; font-size: 10px; text-align: left; }
        th { background-color: #e0e0e0; }
        .footer { margin-top: 30px; font-size: 9px; color: #555555; text-align: center; }
    </style>
</head>
<body>
<div class="header">
    <h1>ACADEMIA PREUNIVERSITARIA HORIZONTE</h1>
    <h2>ALUMNOS CON PAGOS VENCIDOS</h2>
</div>
<table>
    <thead>
    <tr><th>Alumno</th><th>Correo</th><th>Pagos vencidos</th><th>Monto adeudado</th></tr>
    </thead>
    <tbody>
    <tr th:each="fila : ${filas}">
        <td th:text="${fila.nombre} + ' ' + ${fila.apellido}">-</td>
        <td th:text="${fila.email}">-</td>
        <td th:text="${fila.pagosVencidos}">0</td>
        <td th:text="'S/ ' + ${fila.montoAdeudado}">0</td>
    </tr>
    <tr th:if="${#lists.isEmpty(filas)}"><td colspan="4">Sin alumnos morosos.</td></tr>
    </tbody>
</table>
<div class="footer">Documento generado automáticamente por el Sistema de Matrículas · Academia Horizonte</div>
</body>
</html>
