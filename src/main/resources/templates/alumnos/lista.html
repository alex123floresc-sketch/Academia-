<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout}">
<head>
    <title>Alumnos</title>
</head>
<div layout:fragment="contenido">

    <div class="card">
        <div class="card-head">
            <div>
                <h2>Alumnos</h2>
                <p>Registro general de alumnos de la academia</p>
            </div>
            <a th:href="@{/alumnos/nuevo}" sec:authorize="hasAnyRole('ADMIN','CAJERO')" class="btn btn-primary btn-sm">
                <svg class="ic" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>Nuevo alumno
            </a>
        </div>
        <div class="searchbar">
            <form method="get" th:action="@{/alumnos}" style="display:flex;gap:8px;flex:1">
                <input type="text" name="q" th:value="${q}" placeholder="Buscar por nombre, apellido, DNI o correo...">
                <button type="submit" class="btn btn-ghost btn-sm">Buscar</button>
            </form>
        </div>
        <table>
            <thead>
            <tr>
                <th>DNI</th>
                <th>Alumno</th>
                <th>Correo</th>
                <th>Área</th>
                <th>Celular</th>
                <th>Estado</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="alumno : ${alumnos}">
                <td th:text="${alumno.dni} ?: '-'"></td>
                <td class="strong" th:text="${alumno.nombre + ' ' + alumno.apellido}"></td>
                <td th:text="${alumno.email} ?: '-'"></td>
                <td><span class="pill pill-lav" th:text="${alumno.area}"></span></td>
                <td th:text="${alumno.celular} ?: '-'"></td>

                <td>
                        <span th:if="${deuda.containsKey(alumno.id) and deuda.get(alumno.id) > 0}"
                              class="pill pill-amber" th:text="${deuda.get(alumno.id)} + ' pend.'"></span>
                    <span th:unless="${deuda.containsKey(alumno.id) and deuda.get(alumno.id) > 0}"
                          class="pill pill-sage">Al día</span>
                </td>

                <td sec:authorize="hasAnyRole('ADMIN','CAJERO')">
                    <div class="rowact">
                        <a th:href="@{/alumnos/{id}/expediente(id=${alumno.id})}" class="btn btn-ghost btn-sm">Expediente</a>
                        <a th:href="@{/alumnos/{id}/qr-view(id=${alumno.id})}" class="btn btn-ghost btn-sm">QR</a>
                        <a th:href="@{/alumnos/editar/{id}(id=${alumno.id})}" class="btn btn-ghost btn-sm">Editar</a>
                        <form class="tform" th:action="@{/alumnos/eliminar/{id}(id=${alumno.id})}" method="post">
                            <button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('¿Eliminar alumno?')">Eliminar</button>
                        </form>
                    </div>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(alumnos)}">
                <td colspan="7" class="empty">No hay alumnos registrados aún.</td>
            </tr>
            </tbody>
        </table>
        <div th:replace="~{fragments/paginacion :: paginacion(${pagina}, '/alumnos', ${q})}"></div>
    </div>
</div>
</html>
