<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Nueva sesión</title></head>
<div layout:fragment="contenido">
    <a th:href="@{/horarios}" class="page-back">← Volver a la grilla</a>
    <h2 class="page-title" th:text="${horario.id} ? 'Editar sesión' : 'Nueva sesión'"></h2>

    <div class="form-card">
        <div th:if="${error}" class="alert-error" th:text="${error}"></div>
        <form th:action="@{/horarios/guardar}" method="post">
            <input type="hidden" name="id" th:value="${horario.id}">
            <div class="field">
                <label>Curso</label>
                <div class="combo" id="comboCurso" th:attr="data-selected=${horario.curso != null ? horario.curso.id : null}">
                    <input type="text" class="combo-input" placeholder="Buscar por código o nombre..." autocomplete="off" required>
                    <button type="button" class="combo-clear" aria-label="Quitar selección">&times;</button>
                    <input type="hidden" name="cursoId" class="combo-value">
                    <div class="combo-panel">
                        <div class="combo-row" th:each="c : ${cursos}"
                             th:attr="data-valor=${c.id},data-texto=${c.codigo + ' - ' + c.nombre},data-buscar=${#strings.toLowerCase(c.codigo + ' ' + c.nombre)}">
                            <div class="cn" th:text="${c.nombre}"></div>
                            <span class="ch" th:text="${c.codigo}"></span>
                        </div>
                        <p class="combo-empty" style="display:none">Sin resultados.</p>
                    </div>
                </div>
            </div>

            <div class="grid-2">
                <div class="field">
                    <label>Ciclo</label>
                    <div class="combo" id="comboCiclo" th:attr="data-selected=${horario.ciclo != null ? horario.ciclo.id : null}">
                        <input type="text" class="combo-input" placeholder="Buscar ciclo..." autocomplete="off" required>
                        <button type="button" class="combo-clear" aria-label="Quitar selección">&times;</button>
                        <input type="hidden" name="cicloId" class="combo-value">
                        <div class="combo-panel">
                            <div class="combo-row" th:each="c : ${ciclos}"
                                 th:attr="data-valor=${c.id},data-texto=${c.nombre},data-buscar=${#strings.toLowerCase(c.nombre)}">
                                <div class="cn" th:text="${c.nombre}"></div>
                            </div>
                            <p class="combo-empty" style="display:none">Sin resultados.</p>
                        </div>
                    </div>
                </div>
                <div class="field">
                    <label>Turno</label>
                    <select name="turno" required>
                        <option th:each="t : ${turnos}" th:value="${t}" th:text="${t.etiqueta}"
                                th:selected="${horario.turno == t}"></option>
                    </select>
                </div>
            </div>

            <div class="grid-3">
                <div class="field">
                    <label>Día</label>
                    <select name="diaSemana" required>
                        <option th:each="d : ${dias}" th:value="${d}" th:text="${d.etiqueta}"
                                th:selected="${horario.diaSemana == d}"></option>
                    </select>
                </div>
                <div class="field"><label>Inicio</label><input type="time" name="horaInicio" id="horaInicio" required th:value="${horario.horaInicio}"></div>
                <div class="field"><label>Fin</label><input type="time" name="horaFin" id="horaFin" required th:value="${horario.horaFin}"></div>
            </div>
            <p class="field-error" id="rangoError" style="display:none">La hora de fin debe ser posterior a la hora de inicio.</p>

            <div class="field"><label>Aula <span class="hint">opcional</span></label><input type="text" name="aula" th:value="${horario.aula}" placeholder="Ej. 3"></div>

            <div class="form-foot">
                <button type="submit" class="btn btn-primary">Guardar</button>
                <a th:href="@{/horarios}" class="btn btn-ghost">Cancelar</a>
            </div>
        </form>
    </div>

    <script th:src="@{/js/buscador-select.js}"></script>
    <script>
        initCombo('comboCurso');
        initCombo('comboCiclo');
    </script>

    <!-- Validación en vivo del rango horario -->
    <script>(function(){
        var inicio = document.getElementById('horaInicio');
        var fin = document.getElementById('horaFin');
        var error = document.getElementById('rangoError');
        if(!inicio || !fin) return;
        function validar(){
            var invalido = inicio.value && fin.value && fin.value <= inicio.value;
            error.style.display = invalido ? 'block' : 'none';
            fin.classList.toggle('input-invalid', invalido);
        }
        inicio.addEventListener('input', validar);
        fin.addEventListener('input', validar);
        validar();
    })();</script>
</div>
</html>
