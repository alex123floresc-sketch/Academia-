server:
  port: ${PORT:9094}

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/Academia?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:mysql123@}
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: ${SHOW_SQL:true}

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    cache: ${THYMELEAF_CACHE:false}
    encoding: UTF-8